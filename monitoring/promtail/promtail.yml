server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 收集 syslog 和应用日志
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: yishun-server
          __path__: /var/log/**/*.log
