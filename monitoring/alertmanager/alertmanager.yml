global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'feishu-webhook'
  routes:
    - match:
        severity: critical
      receiver: 'feishu-webhook'
      continue: true
    - match:
        severity: warning
      receiver: 'feishu-webhook'

receivers:
  - name: 'feishu-webhook'
    webhook_configs:
      # ⚠️ 请替换为你的飞书机器人 WebHook 地址
      - url: 'https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_WEBHOOK_ID'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
