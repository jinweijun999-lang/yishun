name: Deploy to Production
# 注意: 部署已改用服务器cron定时任务
# 服务器每分钟自动 git pull + docker-compose up -d --build

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Commit to trigger server pull
        run: |
          echo "代码已推送，服务器将在1分钟内自动拉取并部署"
          echo "查看部署日志: ssh yishun@34.102.18.91 'tail -f /home/yishun/deploy.log'"
